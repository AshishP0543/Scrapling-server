apiVersion: v1
kind: Service
metadata:
  name: scrapling-api
spec:
  type: ClusterIP
  selector: { app: scrapling }
  ports:
    - { name: api, port: 80, targetPort: 8771 }
---
apiVersion: v1
kind: Service
metadata:
  name: scrapling-dashboard
spec:
  type: ClusterIP
  selector: { app: scrapling }
  ports:
    - { name: dashboard, port: 80, targetPort: 8770 }
